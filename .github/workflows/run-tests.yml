name: phpunit

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.5' ]
    # continue-on-error: ${{ matrix.php == '8.6' }}

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, bcmath, intl, gd, exif, iconv, fileinfo, swoole
          ini-values: error_reporting=E_ALL
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # Поставляемая версия mysql быстра и достаточно современна
      - name: Start mysql
        run: |
          sudo systemctl start mysql.service
          mysql -u root -proot -e 'CREATE DATABASE IF NOT EXISTS tests;'

      - name: Run composer install
        run: composer install --prefer-dist --no-interaction --no-progress
        env:
          # {"http-basic":{"example.com":{"username":"login","password":"key"}}}
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: Cache yarn dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}

      - run: yarn install --frozen-lockfile
      - run: yarn build

      - name: Install graphicsmagick
        run: sudo apt install graphicsmagick

      - name: Prepare Laravel Application
        run: |
          cp .env.ci .env
          php artisan key:generate
          php artisan migrate:fresh

      - name: Run Laravel Pint
        run: composer pint --parallel --test

      - name: Run PHPUnit
        run: composer test
